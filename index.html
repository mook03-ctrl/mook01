<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Extractor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7863183620197765" crossorigin="anonymous"></script>

    <!-- Firebase SDK (Modular) -->
    <script type="module" src="static/script.js"></script>
</head>
<body>
    <div class="glass-bg"></div>
    
    <div class="version-badge">Copyright 2026 Mook, Serverless Edition</div>
    
    <div class="layout-wrapper">
        <main class="container">
            <header>
                <div class="logo-container">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3Z" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M3 9H21" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9 21V9" stroke="url(#paint2_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="paint0_linear" x1="3" y1="3" x2="21" y2="21" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4F46E5" />
                                <stop offset="1" stop-color="#9333EA" />
                            </linearGradient>
                            <linearGradient id="paint1_linear" x1="3" y1="9" x2="21" y2="9" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4F46E5" />
                                <stop offset="1" stop-color="#9333EA" />
                            </linearGradient>
                            <linearGradient id="paint2_linear" x1="9" y1="9" x2="9" y2="21" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4F46E5" />
                                <stop offset="1" stop-color="#9333EA" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <h1>AI Extractor</h1>
                </div>
            </header>

            <div id="ai-extractor" class="tab-content active">
                <section class="input-section glass-card">
                    <p class="tab-desc">구글 제미나이와 Chat GPT 공유 링크에서 대화 내용과 표를 추출하여 엑셀, PPT, 워드에 바로 붙여넣으세요.</p>
                    <p class="info-desc" style="font-size: 0.85rem; color: #a1a1aa; margin-bottom: 1rem;">※ 무료 서버를 사용하여 백그라운드 봇이 추출을 진행하므로 약 1~5분의 대기 시간이 발생할 수 있습니다.</p>
                    <form id="extract-form">
                        <div class="input-group">
                            <input type="url" id="url-input" placeholder="https://gemini.google.com/share/... 또는 https://chatgpt.com/share/..." required>
                            <button type="submit" id="submit-btn">
                                <span>추출 요청</span>
                                <div class="spinner" id="loading-spinner"></div>
                            </button>
                        </div>
                    </form>
                    <div id="status-message" class="info hidden" style="margin-top: 1rem; color: #4F46E5; font-weight: 500;"></div>
                    <div id="error-message" class="error hidden"></div>
                </section>

                <section id="results-section" class="results-section hidden">
                    <header class="results-header">
                        <h2>추출된 표 (<span id="table-count">0</span>)</h2>
                    </header>
                    <div id="tables-container" class="tables-container">
                        <!-- Tables will be injected here -->
                    </div>
                    
                    <div id="text-results-section" class="text-results-section">
                        <header class="text-header">
                            <h2>대화 텍스트 내용</h2>
                            <button class="copy-btn primary" id="copy-text-btn">전체 내용 복사</button>
                        </header>
                        <div class="text-scroll">
                            <pre id="text-container" class="text-container"></pre>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- 오른쪽 글로벌 광고 영역 -->
        <aside class="ad-sidebar">
            <div class="ad-container">
                <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7863183620197765" crossorigin="anonymous"></script>
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-7863183620197765"
                     data-ad-slot="광고단위의 ID숫자를여기에넣으세요"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </aside>
    </div>
</body>
</html>
